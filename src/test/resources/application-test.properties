# ════════════════════════════════════════════════════════════════
#  application-test.properties — perfil ativado em @ActiveProfiles("test")
# ════════════════════════════════════════════════════════════════

# H2 separado para testes (não mistura com dev)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Desabilita auto-config do RabbitMQ (usamos @MockBean nos testes)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Silencia logs desnecessários durante testes
logging.level.com.library=WARN
logging.level.org.springframework=WARN
