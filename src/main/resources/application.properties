# ════════════════════════════════════════════════════════════════
#  application.properties — library-service (REFATORADO ASSÍNCRONO)
# ════════════════════════════════════════════════════════════════

# ── Servidor ─────────────────────────────────────────────────────
server.port=8081

# ── H2 (banco em memória) ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/librarydb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console H2 acessível em: http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ════════════════════════════════════════════════════════════════
# RabbitMQ CONFIGURAÇÃO ASSÍNCRONA ORIENTADA A EVENTOS
# ════════════════════════════════════════════════════════════════

# ── Conexão ────────────────────────────────────────────────────
# Em produção, use variáveis de ambiente ou secrets:
# spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ── Timeout ────────────────────────────────────────────────────
# Tempo máximo para conectar ao broker
spring.rabbitmq.connection-timeout=10s

# ── Fila Principal ────────────────────────────────────────────
app.messaging.book-created-queue=book-created-queue
app.messaging.book-created-exchange=book-events-exchange
app.messaging.book-created-routing-key=book.created

# ── Dead Letter Queue (DLQ) ───────────────────────────────────
# Para mensagens que falharam após todas as tentativas
app.messaging.book-created-dlq=book-created-dlq
app.messaging.book-created-dlx=book-created-dlx

# ════════════════════════════════════════════════════════════════
# RabbitMQ RETRY POLICY (Spring AMQP Listener)
# ════════════════════════════════════════════════════════════════

# Ativar retry automático
spring.rabbitmq.listener.simple.retry.enabled=true

# Máximo de tentativas antes de enviar para DLQ
# 1 tentativa original + 3 retries = 4 tentativas no total
spring.rabbitmq.listener.simple.retry.max-attempts=3

# Intervalo inicial de espera entre retries (milissegundos)
# 1ª tentativa: imediata
# 2ª tentativa: +1000ms
# 3ª tentativa: +1000ms (sem multiplicador)
spring.rabbitmq.listener.simple.retry.initial-interval=1000

# Multiplicador de espera (ex: 1.5 para backoff exponencial)
# Com 1.0: sempre espera o mesmo tempo
# Com 1.5: 1ª tentativa 1s, 2ª 1.5s, 3ª 2.25s
spring.rabbitmq.listener.simple.retry.multiplier=1.0

# Máximo de espera entre tentativas (em caso de backoff exponencial)
spring.rabbitmq.listener.simple.retry.max-interval=10000

# Modo de reconhecimento de mensagens
# AUTO: Spring faz ACK automaticamente se sem exceção
# MANUAL: Você controla quando fazer ACK (mais complexo, mais flexível)
# MANUAL_ACK: mesmo que MANUAL
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# ════════════════════════════════════════════════════════════════
# RabbitMQ PERFORMANCE & TUNING
# ════════════════════════════════════════════════════════════════

# Concorrência de consumers (quantos threads processam simultaneamente)
# padrão: 1. Aumentar para paralelizar
spring.rabbitmq.listener.simple.concurrency=1
spring.rabbitmq.listener.simple.max-concurrency=10

# Prefetch count: quantas mensagens o consumer "pré-carrega"
# 1 = consome 1 de vez (mais lento, mas mais fair)
# 10 = consome até 10 de vez (mais rápido, menos fair)
# Recomendado: 10-100 dependendo do tamanho das mensagens
spring.rabbitmq.listener.simple.prefetch=1

# ════════════════════════════════════════════════════════════════
# LOGGING
# ════════════════════════════════════════════════════════════════

# Log detalhado do projeto
logging.level.com.library=DEBUG

# Log do Spring AMQP (verbose)
logging.level.org.springframework.amqp=DEBUG

# Log do RabbitMQ (verbose)
logging.level.com.rabbitmq=INFO

# Log do Hibernate (SQL)
logging.level.org.hibernate=INFO

# ════════════════════════════════════════════════════════════════
# NOTAS DE CONFIGURAÇÃO
# ════════════════════════════════════════════════════════════════

# 1. RETRY POLICY:
#    Se um consumer falha com exceção:
#    - Spring AMQP automaticamente retorna msg à fila
#    - Aguarda 'initial-interval'
#    - Tenta novamente
#    - Máximo 'max-attempts' (3)
#    - Após exaurir: envia para DLQ
#
# 2. DLQ (Dead Letter Queue):
#    - Mensagens que falharam 3+ vezes vão aqui
#    - Um operador ou sistema pode monitorar
#    - Pode reprocessar manualmente
#
# 3. CONCURRENCY:
#    - Aumentar para processar mais mensagens em paralelo
#    - ATENCIÓN: Aumentar com cuidado (banco pode ficar sobrecarregado)
#    - Recomendado: teste de carga primeiro
#
# 4. PREFETCH:
#    - Se prefetch=1: fair (mas mais lento)
#    - Se prefetch=10: rápido (mas um consumer pode pegar tudo)
#    - Recomendado começar com 1, ajustar conforme teste
#
# 5. PERSISTÊNCIA:
#    - Fila é DURABLE (sobrevive restart do broker)
#    - Mensagens são persistidas em disco
#    - Garante que não perde dados

