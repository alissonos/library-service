# ════════════════════════════════════════════════════════════════
#  application.properties — library-service
# ════════════════════════════════════════════════════════════════

# ── Servidor ─────────────────────────────────────────────────────
server.port=8081
# ── H2 (banco em memória) ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/librarydb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console H2 acessível em: http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── RabbitMQ ──────────────────────────────────────────────────────
# Em produção, substitua pelo host real do broker
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Nome da fila — centralizado aqui para evitar "magic strings" no código
app.messaging.book-created-queue=book-created-queue

# ── RabbitMQ Retry ────────────────────────────────────────────────
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000ms

# ── Logs ─────────────────────────────────────────────────────────
logging.level.com.library=DEBUG
